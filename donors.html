<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BloodLink — Donor Management</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar" id="topbar"></div>
    <div class="page-header">
      <div class="flex items-center justify-between">
        <div>
          <h1>Donor Management</h1>
          <p class="subtitle">Register and manage blood donors</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('add-donor-modal')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
          Add Donor
        </button>
      </div>
    </div>

    <div class="page-body">

      <div class="flex items-center justify-between" style="margin-bottom:20px">
        <div class="search-bar">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" class="form-input" placeholder="Search donors..." id="donor-search" oninput="filterDonors()">
        </div>
        <div class="flex gap-2">
          <select class="form-input" style="width:auto;min-width:130px" id="group-filter" onchange="filterDonors()">
            <option value="">All Groups</option>
            <option value="A+">A+</option><option value="A-">A-</option>
            <option value="B+">B+</option><option value="B-">B-</option>
            <option value="AB+">AB+</option><option value="AB-">AB-</option>
            <option value="O+">O+</option><option value="O-">O-</option>
          </select>
        </div>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Blood Group</th>
              <th>Phone</th>
              <th>City</th>
              <th>Last Donation</th>
              <th>Status</th>
              <th style="width:80px">Actions</th>
            </tr>
          </thead>
          <tbody id="donor-table-body">
            <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray-400)">Loading donors...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="add-donor-modal">
  <div class="modal">
    <div class="flex items-center justify-between" style="margin-bottom:20px">
      <div>
        <div class="modal-title">Add New Donor</div>
        <div class="modal-subtitle">Enter the donor's information below</div>
      </div>
      <button class="btn-icon" onclick="closeModal('add-donor-modal')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input type="text" id="d-name" class="form-input" placeholder="Enter full name">
      </div>
      <div class="form-group">
        <label class="form-label">Blood Group *</label>
        <select id="d-blood" class="form-input">
          <option value="">Select</option>
          <option value="A+">A+</option><option value="A-">A-</option>
          <option value="B+">B+</option><option value="B-">B-</option>
          <option value="AB+">AB+</option><option value="AB-">AB-</option>
          <option value="O+">O+</option><option value="O-">O-</option>
        </select>
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input type="tel" id="d-phone" class="form-input" placeholder="9876543210">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="d-email" class="form-input" placeholder="donor@email.com">
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Age</label>
        <input type="number" id="d-age" class="form-input" placeholder="25" min="18" max="65">
      </div>
      <div class="form-group">
        <label class="form-label">Gender</label>
        <select id="d-gender" class="form-input">
          <option value="">Select</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">City</label>
        <input type="text" id="d-city" class="form-input" placeholder="Delhi">
      </div>
      <div class="form-group">
        <label class="form-label">Last Donation Date</label>
        <input type="date" id="d-lastdon" class="form-input">
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('add-donor-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="addDonor()">Add Donor</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/ui.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>

<script>
document.getElementById('sidebar').innerHTML = renderSidebar('donors');
document.getElementById('topbar').innerHTML = renderTopbar('Donors');

let allDonors = [];

async function loadDonors() {
  try {
    allDonors = await DB.donors.getAll();
    renderDonorTable(allDonors);
  } catch (err) {
    console.error('Error loading donors:', err);
  }
}

function renderDonorTable(donors) {
  const tbody = document.getElementById('donor-table-body');
  if (donors.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><p>No donors found. Add your first donor above.</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = donors.map(d => `
    <tr>
      <td>
        <div style="font-weight:500">${d.name}</div>
        <div style="font-size:0.75rem;color:var(--gray-400)">${d.email || ''}</div>
      </td>
      <td>${bloodGroupBadge(d.bloodGroup)}</td>
      <td>${d.phone || '—'}</td>
      <td>${d.city || '—'}</td>
      <td>${d.lastDonation || '—'}</td>
      <td>
        <span class="badge ${d.available !== false ? 'badge-green' : 'badge-gray'}">
          ${d.available !== false ? 'Available' : 'Unavailable'}
        </span>
      </td>
      <td>
        <div class="flex gap-1">
          <button class="btn-icon" title="Delete" onclick="deleteDonor('${d.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
          </button>
        </div>
      </td>
    </tr>
  `).join('');
}

function filterDonors() {
  const query = document.getElementById('donor-search').value.toLowerCase();
  const group = document.getElementById('group-filter').value;
  let filtered = allDonors;
  if (query) {
    filtered = filtered.filter(d =>
      d.name?.toLowerCase().includes(query) ||
      d.phone?.includes(query) ||
      d.email?.toLowerCase().includes(query) ||
      d.city?.toLowerCase().includes(query)
    );
  }
  if (group) {
    filtered = filtered.filter(d => d.bloodGroup === group);
  }
  renderDonorTable(filtered);
}

async function addDonor() {
  const name = document.getElementById('d-name').value.trim();
  const bloodGroup = document.getElementById('d-blood').value;
  if (!name || !bloodGroup) {
    showToast('Name and blood group are required', 'error');
    return;
  }
  const donor = {
    name,
    bloodGroup,
    phone: document.getElementById('d-phone').value.trim(),
    email: document.getElementById('d-email').value.trim(),
    age: parseInt(document.getElementById('d-age').value) || null,
    gender: document.getElementById('d-gender').value,
    city: document.getElementById('d-city').value.trim(),
    lastDonation: document.getElementById('d-lastdon').value || null,
    available: true
  };

  await DB.donors.add(donor);
  showToast('Donor added successfully', 'success');
  closeModal('add-donor-modal');
  ['d-name','d-blood','d-phone','d-email','d-age','d-gender','d-city','d-lastdon'].forEach(id => document.getElementById(id).value = '');
  loadDonors();
}

async function deleteDonor(id) {
  if (confirm('Are you sure you want to remove this donor?')) {
    await DB.donors.delete(id);
    showToast('Donor removed', 'success');
    loadDonors();
  }
}

auth.onAuthStateChanged(user => {
  document.getElementById('sidebar').innerHTML = renderSidebar('donors');
  loadDonors();
});
</script>
</body>
</html>
