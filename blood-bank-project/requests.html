<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BloodLink — Blood Requests</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar" id="topbar"></div>
    <div class="page-header">
      <div class="flex items-center justify-between">
        <div>
          <h1>Blood Requests</h1>
          <p class="subtitle">Manage hospital blood requests and track status</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('add-request-modal')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
          New Request
        </button>
      </div>
    </div>

    <div class="page-body">

      <div class="flex gap-2" style="margin-bottom:20px">
        <button class="btn btn-sm status-filter active" data-filter="" onclick="filterRequests(this, '')">All</button>
        <button class="btn btn-sm status-filter" data-filter="pending" onclick="filterRequests(this, 'pending')">Pending</button>
        <button class="btn btn-sm status-filter" data-filter="approved" onclick="filterRequests(this, 'approved')">Approved</button>
        <button class="btn btn-sm status-filter" data-filter="matched" onclick="filterRequests(this, 'matched')">Matched</button>
        <button class="btn btn-sm status-filter" data-filter="completed" onclick="filterRequests(this, 'completed')">Completed</button>
      </div>
      <style>
        .status-filter { background:var(--gray-100);color:var(--gray-600);border:none; }
        .status-filter:hover { background:var(--gray-200); }
        .status-filter.active { background:var(--gray-900);color:var(--white); }
      </style>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Hospital</th>
              <th>Blood Group</th>
              <th>Units</th>
              <th>Urgency</th>
              <th>Status</th>
              <th>Patient</th>
              <th>Date</th>
              <th style="width:120px">Actions</th>
            </tr>
          </thead>
          <tbody id="req-table-body">
            <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--gray-400)">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="add-request-modal">
  <div class="modal">
    <div class="flex items-center justify-between" style="margin-bottom:20px">
      <div>
        <div class="modal-title">New Blood Request</div>
        <div class="modal-subtitle">Submit a blood request on behalf of a hospital</div>
      </div>
      <button class="btn-icon" onclick="closeModal('add-request-modal')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>

    <div class="form-group">
      <label class="form-label">Hospital Name *</label>
      <input type="text" id="r-hospital" class="form-input" placeholder="AIIMS Delhi">
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Blood Group *</label>
        <select id="r-blood" class="form-input">
          <option value="">Select</option>
          <option value="A+">A+</option><option value="A-">A-</option>
          <option value="B+">B+</option><option value="B-">B-</option>
          <option value="AB+">AB+</option><option value="AB-">AB-</option>
          <option value="O+">O+</option><option value="O-">O-</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Units Needed *</label>
        <input type="number" id="r-units" class="form-input" placeholder="2" min="1">
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Urgency *</label>
        <select id="r-urgency" class="form-input">
          <option value="normal">Normal</option>
          <option value="high">High</option>
          <option value="critical">Critical</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Patient Name</label>
        <input type="text" id="r-patient" class="form-input" placeholder="Patient name">
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Contact Person</label>
        <input type="text" id="r-contact" class="form-input" placeholder="Dr. Name">
      </div>
      <div class="form-group">
        <label class="form-label">Contact Phone</label>
        <input type="tel" id="r-phone" class="form-input" placeholder="9876543210">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea id="r-notes" class="form-input" placeholder="Additional information..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('add-request-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="addRequest()">Submit Request</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/ui.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>

<script>
document.getElementById('sidebar').innerHTML = renderSidebar('requests');
document.getElementById('topbar').innerHTML = renderTopbar('Requests');

let allRequests = [];
const statusFlow = ['pending', 'approved', 'matched', 'completed'];

async function loadRequests() {
  try {
    allRequests = await DB.requests.getAll();
    renderRequestTable(allRequests);
  } catch (err) {
    console.error('Error loading requests:', err);
  }
}

function renderRequestTable(requests) {
  const tbody = document.getElementById('req-table-body');
  if (requests.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><p>No blood requests found.</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = requests.map(r => {
    const currentIdx = statusFlow.indexOf(r.status);
    const nextStatus = currentIdx < statusFlow.length - 1 ? statusFlow[currentIdx + 1] : null;

    return `
      <tr>
        <td>
          <div style="font-weight:500">${r.hospitalName}</div>
          <div style="font-size:0.75rem;color:var(--gray-400)">${r.contactPerson || ''} ${r.contactPhone ? '· ' + r.contactPhone : ''}</div>
        </td>
        <td>${bloodGroupBadge(r.bloodGroup)}</td>
        <td><strong>${r.unitsNeeded}</strong></td>
        <td>${urgencyBadge(r.urgency)}</td>
        <td>${statusPill(r.status)}</td>
        <td>${r.patientName || '—'}</td>
        <td>${formatDate(r.createdAt)}</td>
        <td>
          <div class="flex gap-1">
            ${nextStatus ? `<button class="btn btn-sm btn-secondary" onclick="advanceStatus('${r.id}','${nextStatus}')" title="Move to ${nextStatus}">
              ${nextStatus === 'approved' ? 'Approve' : nextStatus === 'matched' ? 'Match' : 'Complete'}
            </button>` : '<span class="text-xs text-muted">Done</span>'}
            <button class="btn-icon" title="Delete" onclick="deleteRequest('${r.id}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            </button>
          </div>
        </td>
      </tr>
    `;
  }).join('');
}

function filterRequests(btn, status) {
  document.querySelectorAll('.status-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = status ? allRequests.filter(r => r.status === status) : allRequests;
  renderRequestTable(filtered);
}

async function advanceStatus(id, newStatus) {
  await DB.requests.updateStatus(id, newStatus);
  showToast(`Request moved to ${newStatus}`, 'success');
  loadRequests();
}

async function addRequest() {
  const hospitalName = document.getElementById('r-hospital').value.trim();
  const bloodGroup = document.getElementById('r-blood').value;
  const unitsNeeded = parseInt(document.getElementById('r-units').value);
  if (!hospitalName || !bloodGroup || !unitsNeeded) {
    showToast('Hospital, blood group, and units are required', 'error');
    return;
  }
  await DB.requests.add({
    hospitalName, bloodGroup, unitsNeeded,
    urgency: document.getElementById('r-urgency').value,
    patientName: document.getElementById('r-patient').value.trim(),
    contactPerson: document.getElementById('r-contact').value.trim(),
    contactPhone: document.getElementById('r-phone').value.trim(),
    notes: document.getElementById('r-notes').value.trim()
  });
  showToast('Request submitted', 'success');
  closeModal('add-request-modal');
  ['r-hospital','r-blood','r-units','r-patient','r-contact','r-phone','r-notes'].forEach(id => document.getElementById(id).value = '');
  loadRequests();
}

async function deleteRequest(id) {
  if (confirm('Delete this request?')) {
    await DB.requests.delete(id);
    showToast('Request deleted', 'success');
    loadRequests();
  }
}

auth.onAuthStateChanged(user => {
  document.getElementById('sidebar').innerHTML = renderSidebar('requests');
  loadRequests();
});
</script>
</body>
</html>
