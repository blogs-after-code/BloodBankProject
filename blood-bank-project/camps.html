<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BloodLink — Donation Camps</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar" id="topbar"></div>
    <div class="page-header">
      <div class="flex items-center justify-between">
        <div>
          <h1>Donation Camps</h1>
          <p class="subtitle">Organize and track blood donation drives</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('add-camp-modal')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
          Create Camp
        </button>
      </div>
    </div>

    <div class="page-body">

      <div id="camps-grid" class="grid-2" style="gap:20px"></div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="add-camp-modal">
  <div class="modal">
    <div class="flex items-center justify-between" style="margin-bottom:20px">
      <div>
        <div class="modal-title">Create Donation Camp</div>
        <div class="modal-subtitle">Plan a new blood donation drive</div>
      </div>
      <button class="btn-icon" onclick="closeModal('add-camp-modal')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>

    <div class="form-group">
      <label class="form-label">Camp Name *</label>
      <input type="text" id="c-name" class="form-input" placeholder="Republic Day Blood Drive">
    </div>
    <div class="form-group">
      <label class="form-label">Organizer *</label>
      <input type="text" id="c-organizer" class="form-input" placeholder="Red Cross Delhi">
    </div>
    <div class="form-group">
      <label class="form-label">Location *</label>
      <input type="text" id="c-location" class="form-input" placeholder="India Gate Grounds, Delhi">
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Date *</label>
        <input type="date" id="c-date" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Expected Donors</label>
        <input type="number" id="c-expected" class="form-input" placeholder="50" min="1">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Contact Phone</label>
      <input type="tel" id="c-phone" class="form-input" placeholder="9876543210">
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('add-camp-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="addCamp()">Create Camp</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/ui.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>

<script>
document.getElementById('sidebar').innerHTML = renderSidebar('camps');
document.getElementById('topbar').innerHTML = renderTopbar('Camps');

async function loadCamps() {
  try {
    const camps = await DB.camps.getAll();
    const grid = document.getElementById('camps-grid');

    if (camps.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;padding:60px"><p>No donation camps yet. Create your first camp above.</p></div>`;
      return;
    }

    grid.innerHTML = camps.map(c => {
      const campDate = c.date ? (typeof c.date === 'string' ? new Date(c.date) : (c.date.toDate ? c.date.toDate() : new Date(c.date))) : null;
      const isPast = campDate && campDate < new Date();
      const progress = c.expectedDonors ? Math.min(100, Math.round((c.registeredDonors / c.expectedDonors) * 100)) : 0;
      const progressColor = progress >= 80 ? 'var(--green-500)' : progress >= 50 ? 'var(--amber-500)' : 'var(--red-500)';

      return `
        <div class="card" style="position:relative">
          <div class="flex items-center justify-between" style="margin-bottom:14px">
            <span class="badge ${isPast ? 'badge-gray' : 'badge-green'}">${isPast ? 'Completed' : 'Upcoming'}</span>
            <button class="btn-icon" title="Delete" onclick="deleteCamp('${c.id}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            </button>
          </div>
          <h3 style="margin-bottom:4px">${c.name}</h3>
          <div class="text-sm text-muted" style="margin-bottom:16px">${c.organizer || ''}</div>

          <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">
            <div class="flex items-center gap-2 text-sm">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="2"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
              <span>${c.location || '—'}</span>
            </div>
            <div class="flex items-center gap-2 text-sm">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="2"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
              <span>${campDate ? campDate.toLocaleDateString('en-IN', {day:'numeric',month:'long',year:'numeric'}) : '—'}</span>
            </div>
            ${c.contactPhone ? `<div class="flex items-center gap-2 text-sm">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              <span>${c.contactPhone}</span>
            </div>` : ''}
          </div>

          <div style="margin-bottom:8px">
            <div class="flex justify-between text-sm" style="margin-bottom:6px">
              <span style="color:var(--gray-500)">Registered Donors</span>
              <span style="font-weight:600">${c.registeredDonors || 0} / ${c.expectedDonors || '—'}</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${progress}%;background:${progressColor}"></div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  } catch (err) {
    console.error('Error loading camps:', err);
  }
}

async function addCamp() {
  const name = document.getElementById('c-name').value.trim();
  const organizer = document.getElementById('c-organizer').value.trim();
  const location = document.getElementById('c-location').value.trim();
  const date = document.getElementById('c-date').value;

  if (!name || !organizer || !location || !date) {
    showToast('Please fill in all required fields', 'error');
    return;
  }

  await DB.camps.add({
    name, organizer, location, date,
    expectedDonors: parseInt(document.getElementById('c-expected').value) || 50,
    contactPhone: document.getElementById('c-phone').value.trim(),
    status: 'upcoming'
  });
  showToast('Camp created successfully', 'success');
  closeModal('add-camp-modal');
  ['c-name','c-organizer','c-location','c-date','c-expected','c-phone'].forEach(id => document.getElementById(id).value = '');
  loadCamps();
}

async function deleteCamp(id) {
  if (confirm('Delete this camp?')) {
    await DB.camps.delete(id);
    showToast('Camp deleted', 'success');
    loadCamps();
  }
}

auth.onAuthStateChanged(user => {
  document.getElementById('sidebar').innerHTML = renderSidebar('camps');
  loadCamps();
});
</script>
</body>
</html>
