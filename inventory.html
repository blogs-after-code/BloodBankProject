<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BloodLink — Inventory</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar" id="topbar"></div>
    <div class="page-header">
      <div class="flex items-center justify-between">
        <div>
          <h1>Blood Inventory</h1>
          <p class="subtitle">Track stock levels and expiry dates</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('add-stock-modal')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
          Add Stock
        </button>
      </div>
    </div>

    <div class="page-body">

      <div class="grid-4" id="inventory-summary" style="margin-bottom:24px"></div>

      <div class="table-wrapper">
        <div class="table-header">
          <h4>Inventory Batches</h4>
          <select class="form-input" style="width:auto;min-width:130px" id="inv-filter" onchange="filterInventory()">
            <option value="">All Groups</option>
            <option value="A+">A+</option><option value="A-">A-</option>
            <option value="B+">B+</option><option value="B-">B-</option>
            <option value="AB+">AB+</option><option value="AB-">AB-</option>
            <option value="O+">O+</option><option value="O-">O-</option>
          </select>
        </div>
        <table>
          <thead>
            <tr>
              <th>Blood Group</th>
              <th>Units</th>
              <th>Source</th>
              <th>Collected</th>
              <th>Expires</th>
              <th>Status</th>
              <th style="width:80px">Actions</th>
            </tr>
          </thead>
          <tbody id="inv-table-body">
            <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray-400)">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="add-stock-modal">
  <div class="modal">
    <div class="flex items-center justify-between" style="margin-bottom:20px">
      <div>
        <div class="modal-title">Add Blood Stock</div>
        <div class="modal-subtitle">Record a new blood batch</div>
      </div>
      <button class="btn-icon" onclick="closeModal('add-stock-modal')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Blood Group *</label>
        <select id="s-blood" class="form-input">
          <option value="">Select</option>
          <option value="A+">A+</option><option value="A-">A-</option>
          <option value="B+">B+</option><option value="B-">B-</option>
          <option value="AB+">AB+</option><option value="AB-">AB-</option>
          <option value="O+">O+</option><option value="O-">O-</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Units *</label>
        <input type="number" id="s-units" class="form-input" placeholder="10" min="1">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Source</label>
      <select id="s-source" class="form-input">
        <option value="Walk-in">Walk-in Donor</option>
        <option value="Camp Drive">Camp Drive</option>
        <option value="Emergency Donor">Emergency Donor</option>
        <option value="Transfer">Transfer from another bank</option>
      </select>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Collected Date</label>
        <input type="date" id="s-collected" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Expiry Date</label>
        <input type="date" id="s-expiry" class="form-input">
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('add-stock-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="addStock()">Add Stock</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/ui.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>

<script>
document.getElementById('sidebar').innerHTML = renderSidebar('inventory');
document.getElementById('topbar').innerHTML = renderTopbar('Inventory');

let allBatches = [];

async function loadInventory() {
  try {
    allBatches = await DB.inventory.getAll();
    const summary = await DB.inventory.getSummary();

    const summaryEl = document.getElementById('inventory-summary');
    const totalUnits = Object.values(summary).reduce((s, g) => s + g.available, 0);
    const lowGroups = Object.entries(summary).filter(([_, d]) => d.available <= 5).length;
    const expiring = Object.values(summary).reduce((s, g) => s + g.expiringSoon, 0);

    summaryEl.innerHTML = `
      <div class="stat-card">
        <div class="stat-value">${totalUnits}</div>
        <div class="stat-label">Total Units</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${allBatches.length}</div>
        <div class="stat-label">Total Batches</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--amber-600)">${lowGroups}</div>
        <div class="stat-label">Low Stock Groups</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--red-600)">${expiring}</div>
        <div class="stat-label">Expiring Soon</div>
      </div>
    `;

    renderInventoryTable(allBatches);
  } catch (err) {
    console.error('Error loading inventory:', err);
  }
}

function getExpiryStatus(expiryDate) {
  if (!expiryDate) return { label: '—', class: '' };
  const exp = typeof expiryDate === 'string' ? new Date(expiryDate) : (expiryDate.toDate ? expiryDate.toDate() : new Date(expiryDate));
  const now = new Date();
  const diff = (exp - now) / (1000 * 60 * 60 * 24);
  if (diff < 0) return { label: 'Expired', class: 'badge-red' };
  if (diff <= 7) return { label: 'Expiring soon', class: 'badge-amber' };
  return { label: 'Good', class: 'badge-green' };
}

function renderInventoryTable(batches) {
  const tbody = document.getElementById('inv-table-body');
  if (batches.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><p>No inventory batches. Add stock above.</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = batches.map(b => {
    const expiry = getExpiryStatus(b.expiryDate);
    return `
      <tr>
        <td>${bloodGroupBadge(b.bloodGroup)}</td>
        <td><strong>${b.units}</strong></td>
        <td>${b.source || '—'}</td>
        <td>${b.collectedDate || '—'}</td>
        <td>
          <div>${b.expiryDate || '—'}</div>
          ${expiry.class ? `<span class="badge ${expiry.class}" style="margin-top:4px">${expiry.label}</span>` : ''}
        </td>
        <td>${stockLevelBadge(b.units)}</td>
        <td>
          <button class="btn-icon" title="Delete" onclick="deleteStock('${b.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
          </button>
        </td>
      </tr>
    `;
  }).join('');
}

function filterInventory() {
  const group = document.getElementById('inv-filter').value;
  const filtered = group ? allBatches.filter(b => b.bloodGroup === group) : allBatches;
  renderInventoryTable(filtered);
}

async function addStock() {
  const bloodGroup = document.getElementById('s-blood').value;
  const units = parseInt(document.getElementById('s-units').value);
  if (!bloodGroup || !units) {
    showToast('Blood group and units are required', 'error');
    return;
  }
  await DB.inventory.add({
    bloodGroup,
    units,
    source: document.getElementById('s-source').value,
    collectedDate: document.getElementById('s-collected').value || null,
    expiryDate: document.getElementById('s-expiry').value || null
  });
  showToast('Stock added successfully', 'success');
  closeModal('add-stock-modal');
  ['s-blood','s-units','s-collected','s-expiry'].forEach(id => document.getElementById(id).value = '');
  loadInventory();
}

async function deleteStock(id) {
  if (confirm('Remove this batch?')) {
    await DB.inventory.delete(id);
    showToast('Batch removed', 'success');
    loadInventory();
  }
}

auth.onAuthStateChanged(user => {
  document.getElementById('sidebar').innerHTML = renderSidebar('inventory');
  loadInventory();
});
</script>
</body>
</html>
